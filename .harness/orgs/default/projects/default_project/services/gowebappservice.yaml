service:
  name: go-web-app-service
  identifier: gowebappservice
  orgIdentifier: default
  projectIdentifier: default_project
  serviceDefinition:
    spec:
      manifests:
        - manifest:
            identifier: GoWebAppManifest
            type: HelmChart
            spec:
              store:
                type: Github
                spec:
                  connectorRef: GitHub_Connector
                  gitFetchType: Branch
                  folderPath: chart
                  repoName: go-web-app
                  branch: main
              subChartPath: ""
              valuesPaths:
                - chart/values.yaml
              optionalValuesYaml: false
              skipResourceVersioning: false
              enableDeclarativeRollback: false
              helmVersion: V3
              fetchHelmChartMetadata: false
      artifacts:
        primary:
          primaryArtifactRef: <+input>
          sources:
            - spec:
                connectorRef: Docker_Hub_Connector
                imagePath: opeomotayo/go-web-app
                tag: "10"
                digest: ""
              identifier: DockerHubArtifactRepository
              type: DockerRegistry
    type: Kubernetes
