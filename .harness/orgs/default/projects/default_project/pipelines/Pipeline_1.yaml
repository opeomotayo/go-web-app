pipeline:
  name: Pipeline 1
  identifier: Pipeline_1
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: GitHub_Connector
        repoName: go-web-app
        build: <+input>
  stages:
    - stage:
        name: Build Stage
        identifier: Build_Stage
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: Kubernetes_Cluster_Connector
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    connectorRef: Docker_Hub_Connector
                    image: golang:1.26-alpine
                    shell: Sh
                    command: |-
                      go mod download
                      go build ./...
                      go test ./... -v
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: Docker_Hub_Connector
                    repo: opeomotyo/go-web-app
                    tags:
                      - <+pipeline.sequenceId>
                    caching: false
                    dockerfile: Dockerfile
                    context: .
