pipeline:
  name: Build Pipeline
  identifier: Build_Pipeline
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: GitHub_Connector
        repoName: go-web-app
        build: <+input>
  stages:
    - stage:
        name: Build Stage
        identifier: Build_Stage
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: Kubernetes_Cluster_Connector
              namespace: harness
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Build and Test Step
                  identifier: Build_and_Test_Step
                  spec:
                    connectorRef: Docker_Hub_Connector
                    image: golang:1.26-alpine
                    shell: Sh
                    command: |-
                      go mod download
                           go build ./...
                           go test ./... -v
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: Docker_Hub_Connector
                    repo: opeomotayo/go-web-app
                    tags:
                      - <+codebase.commitSha>
                    caching: false
                    dockerfile: Dockerfile
                    context: .
